name: Build IPA

on:
  push:
    branches: [ master ]
  workflow_dispatch:  # allows manual trigger from the GitHub Actions UI

jobs:
  build:
    runs-on: macos-15  # Xcode 16.2, iOS 18 SDK

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project TerrainMapper.xcodeproj \
            -scheme TerrainMapper \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package as IPA
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData \
            -name "TerrainMapper.app" \
            -path "*/Release-iphoneos/*" | head -1)

          echo "Found app: $APP"
          ls "$APP/Info.plist"  # verify it's complete

          IPA_NAME="TerrainMapper v.0.${{ github.run_number }}.ipa"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r "$IPA_NAME" Payload/
          echo "IPA: $IPA_NAME ($(du -sh "$IPA_NAME" | cut -f1))"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TerrainMapper v.0.${{ github.run_number }}
          path: "TerrainMapper v.0.${{ github.run_number }}.ipa"
          retention-days: 30
